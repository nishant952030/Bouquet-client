<script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;
        const { Canvas, useFrame, useThree } = ReactThreeFiber;
        const { Float, Environment, ContactShadows, PerspectiveCamera } = THREE_DREI;

        // --- 3D Components ---

        const Petal = ({ color, ...props }) => {
            const mesh = useRef();
            const [speed] = useState(() => 0.1 + Math.random() * 0.4);
            const [factor] = useState(() => 0.5 + Math.random());
            
            useFrame((state) => {
                const t = state.clock.getElapsedTime();
                mesh.current.rotation.y += speed * 0.1;
                mesh.current.rotation.z += speed * 0.05;
                mesh.current.position.y += Math.sin(t * speed) * 0.002;
            });

            return (
                <Float speed={2} rotationIntensity={1.5} floatIntensity={2}>
                    <mesh ref={mesh} {...props}>
                        <sphereGeometry args={[0.3, 16, 16]} scale={[1, 0.1, 0.5]} />
                        <meshStandardMaterial 
                            color={color} 
                            roughness={0.2} 
                            metalness={0.1}
                            transparent
                            opacity={0.8}
                        />
                    </mesh>
                </Float>
            );
        };

        const SceneBackground = () => {
            const petals = useMemo(() => {
                return Array.from({ length: 25 }).map((_, i) => ({
                    position: [
                        (Math.random() - 0.5) * 15,
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 5 - 2
                    ],
                    rotation: [Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI],
                    scale: 0.5 + Math.random() * 1.5,
                    color: i % 2 === 0 ? '#e48d9c' : '#fbc4ab'
                }));
            }, []);

            return (
                <group>
                    {petals.map((props, i) => <Petal key={i} {...props} />)}
                    <ContactShadows position={[0, -4, 0]} opacity={0.3} scale={20} blur={2} far={4.5} />
                </group>
            );
        };

        const MainApp = () => {
            return (
                <div className="relative w-full h-full">
                    {/* 3D Canvas */}
                    <div className="absolute inset-0 z-0">
                        <Canvas shadows>

                            <ambientLight intensity={0.6} />
                            <pointLight position={[10, 10, 10]} intensity={0.5} color="#fff5f6" />
                            <spotLight position={[-10, 10, 10]} angle={0.15} penumbra={1} intensity={1} castShadow />
                            <SceneBackground />
                            <Environment preset="soft" />
