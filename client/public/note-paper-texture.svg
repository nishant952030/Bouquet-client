<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix
        type="matrix"
        values="0.7 0 0 0 0
                0 0.67 0 0 0
                0 0 0.52 0 0
                0 0 0 0.2 0"
      />
    </filter>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f1dd" />
      <stop offset="100%" stop-color="#eadbb9" />
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#paper)" />
  <rect width="1200" height="900" filter="url(#grain)" />
</svg>
